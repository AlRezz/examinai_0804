# Local development against PostgreSQL. Override URLs and credentials via environment (see README / .env.example).
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/examinai}
    username: ${SPRING_DATASOURCE_USERNAME:examinai}
    password: ${SPRING_DATASOURCE_PASSWORD:examinai}
  jpa:
    hibernate:
      ddl-auto: none
  ai:
    ollama:
      base-url: http://127.0.0.1:11434

management:
  endpoints:
    web:
      exposure:
        include: health,info
