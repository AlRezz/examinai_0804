# Local development without PostgreSQL (story 1.2 wires real Postgres + migrations).
spring:
  datasource:
    url: jdbc:h2:mem:examinai_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
  ai:
    ollama:
      base-url: http://127.0.0.1:11434

management:
  endpoints:
    web:
      exposure:
        include: health,info
