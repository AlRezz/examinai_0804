# Production-oriented defaults; supply credentials via environment (no secrets in-repo).
server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
  error:
    include-stacktrace: never
    include-message: on_param

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/examinai}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:examinai}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: none
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}

management:
  endpoints:
    web:
      exposure:
        include: health
