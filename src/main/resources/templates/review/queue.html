<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title>Review queue</title>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<th:block th:replace="~{fragments/head-bootstrap :: styles}" />
</head>
<body class="bg-body-secondary">
<div class="container py-4">
	<header class="mb-4">
		<h1 class="h2">Mentor review queue</h1>
		<p class="text-secondary mb-0">Submissions awaiting review or in progress, ordered by task due date.</p>
		<p class="mt-2 mb-0 d-flex flex-wrap gap-2 align-items-center">
			<a class="btn btn-sm btn-outline-primary" th:href="@{/tasks}">Program tasks</a>
			<a class="btn btn-sm btn-outline-primary" th:href="@{/home}">Home</a>
		</p>
	</header>
	<div th:replace="~{tasks/fragments/degraded-inference-banner :: banner}"></div>
	<div class="table-responsive card shadow-sm">
		<table class="table table-striped table-hover mb-0">
			<thead class="table-light">
			<tr>
				<th scope="col">Due</th>
				<th scope="col">Task</th>
				<th scope="col">Intern</th>
				<th scope="col">Review status</th>
				<th scope="col">Retrieval</th>
				<th scope="col">Open</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="r : ${rows}">
				<td th:text="${r.dueDate}">due</td>
				<td th:text="${r.taskTitle}">task</td>
				<td th:text="${r.internEmail}">email</td>
				<td th:text="${r.mentorStatusLabel()}">status</td>
				<td th:text="${r.retrievalSummary}">ok</td>
				<td>
					<a class="btn btn-sm btn-primary"
					   th:href="@{/tasks/{tid}/submissions/{iid}(tid=${r.taskId},iid=${r.internId})}">Review</a>
				</td>
			</tr>
			<tr th:if="${#lists.isEmpty(rows)}">
				<td colspan="6" class="text-secondary">No submissions in the review queue.</td>
			</tr>
			</tbody>
		</table>
	</div>
</div>
</body>
</html>
