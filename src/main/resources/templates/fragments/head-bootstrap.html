<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Reusable Bootstrap 5 CSS (WebJar — works without CDN). Include in <head>: th:replace="~{fragments/head-bootstrap :: styles}" -->
<head>
	<th:block th:fragment="styles">
		<link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" />
		<!-- jQuery UI 1.13.2 ThemeRoller “Flick” (structure + theme + images under static/css/jquery-ui/themes/flick/) -->
		<link rel="stylesheet" th:href="@{/css/jquery-ui/themes/flick/jquery-ui.min.css}" />
		<link rel="stylesheet" th:href="@{/css/examai-theme.css}" />
	</th:block>
</head>
</html>
