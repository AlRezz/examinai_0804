<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title th:text="'Feedback — ' + ${task.title}">Feedback</title>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<th:block th:replace="~{fragments/head-bootstrap :: styles}" />
	<style>
		/* Epic 10 — score band (average of three rubric dimensions) */
		.intern-official-panel { border-radius: 0.75rem; box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.06); }
		.intern-official-panel--rose { border-left: 4px solid #e11d48; background: #fff1f2; }
		.intern-official-panel--yellow { border-left: 4px solid #ca8a04; background: #fefce8; }
		.intern-official-panel--green { border-left: 4px solid #16a34a; background: #f0fdf4; }
	</style>
</head>
<body class="bg-body-secondary">
<div class="container py-4">
	<p><a th:href="@{/intern/tasks/{tid}(tid=${task.id})}">← Task</a></p>
	<th:block th:replace="~{intern/fragments/submission-lifecycle-badge :: badge}"/>

	<h1 class="h3 mb-3">Your feedback</h1>
	<p class="text-secondary" th:text="${task.title}">task</p>

	<section class="card shadow-sm mb-4"
	         th:if="${officialReview != null}"
	         th:classappend="${officialFeedbackCardClass}">
		<div class="card-body">
			<h2 class="h5 text-body">Official mentor feedback</h2>
			<p class="small text-secondary mb-2">Published <span th:text="${officialReview.publishedAt}">ts</span></p>
			<p class="mb-2">
				<strong>Scores</strong> —
				quality <span th:text="${officialReview.qualityScore}">0</span>,
				readability <span th:text="${officialReview.readabilityScore}">0</span>,
				correctness <span th:text="${officialReview.correctnessScore}">0</span>
			</p>
			<div class="border rounded p-3 bg-white bg-opacity-75" style="white-space: pre-wrap;" th:text="${officialReview.narrativeFeedback}">narrative</div>
		</div>
	</section>

	<div class="alert alert-light border mb-4" th:if="${officialReview == null}">
		<p class="mb-0"><strong>No official grade yet</strong> for your current submission revision. When your mentor publishes an outcome, it will appear here.</p>
	</div>

	<form th:action="@{/logout}" method="post">
		<button class="btn btn-outline-secondary btn-sm" type="submit">Sign out</button>
	</form>
</div>
</body>
</html>
