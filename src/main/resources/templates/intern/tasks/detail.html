<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title th:text="${task.title}">Task</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
	      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
</head>
<body class="bg-body-secondary">
<main class="container py-4">
	<h1 class="h3" th:text="${task.title}">Task</h1>
	<p><a th:href="@{/intern/tasks}">← My tasks</a></p>
	<p class="alert alert-success py-2" th:if="${submissionNotice}" th:text="${submissionNotice}">notice</p>
	<th:block th:replace="~{intern/fragments/submission-lifecycle-badge :: badge}"/>
	<p class="mb-2" th:if="${submission != null}">
		<a class="btn btn-sm btn-primary" th:href="@{/intern/submissions/{sid}/feedback(sid=${submission.id})}">View mentor feedback</a>
	</p>
	<section class="mb-3">
		<p><strong>Due:</strong> <span th:text="${task.dueDate}">due</span></p>
		<pre class="border rounded p-3 bg-white" th:text="${task.description}">description</pre>
	</section>
	<section class="mb-3" th:if="${submission != null}">
		<h2 class="h5">Current submission</h2>
		<ul class="list-unstyled small">
			<li>Repository: <code th:text="${submission.repoIdentifier}">repo</code></li>
			<li>Commit: <code th:text="${submission.commitSha}">sha</code></li>
			<li th:if="${submission.pathScope != null}">Path scope: <code th:text="${submission.pathScope}">path</code></li>
			<li>Coordinates updated: <span th:text="${submission.updatedAt}">ts</span></li>
		</ul>
	</section>
	<h2 class="h5" th:text="${submission != null} ? 'Update submission coordinates' : 'Attach submission'">Form</h2>
	<form class="card card-body shadow-sm mb-3" th:action="@{/intern/tasks/{id}/submission(id=${task.id})}" th:object="${submissionForm}" method="post">
		<div class="mb-2">
			<label class="form-label">Repository identifier (URL or slug)</label>
			<input class="form-control" type="text" th:field="*{repoIdentifier}" size="80" maxlength="2048" />
			<p class="text-danger small" th:if="${#fields.hasErrors('repoIdentifier')}" th:errors="*{repoIdentifier}">err</p>
		</div>
		<div class="mb-2">
			<label class="form-label">Commit SHA</label>
			<input class="form-control" type="text" th:field="*{commitSha}" maxlength="64" />
			<p class="text-danger small" th:if="${#fields.hasErrors('commitSha')}" th:errors="*{commitSha}">err</p>
		</div>
		<div class="mb-2">
			<label class="form-label">Optional path scope</label>
			<input class="form-control" type="text" th:field="*{pathScope}" maxlength="512" />
			<p class="text-danger small" th:if="${#fields.hasErrors('pathScope')}" th:errors="*{pathScope}">err</p>
		</div>
		<div th:if="${#fields.hasGlobalErrors()}">
			<p class="text-danger small" th:each="err : ${#fields.globalErrors()}" th:text="${err}">global</p>
		</div>
		<button class="btn btn-primary" type="submit">Save coordinates</button>
	</form>
	<form th:action="@{/logout}" method="post">
		<button class="btn btn-outline-secondary" type="submit">Sign out</button>
	</form>
</main>
</body>
</html>
