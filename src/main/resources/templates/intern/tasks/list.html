<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title>My tasks</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<th:block th:replace="~{fragments/head-bootstrap :: styles}" />
</head>
<body class="bg-body-secondary">
<main class="container py-4">
	<h1 class="h3">My assigned tasks</h1>
	<p><a th:href="@{/home}">Home</a></p>
	<ul class="list-group mb-3" th:if="${!#lists.isEmpty(taskRows)}">
		<li class="list-group-item d-flex flex-wrap justify-content-between align-items-center gap-2" th:each="row : ${taskRows}">
			<div>
				<a th:href="@{/intern/tasks/{id}(id=${row.task.id})}" th:text="${row.task.title}">task</a>
				<span class="text-secondary small">— due <span th:text="${row.task.dueDate}">due</span></span>
			</div>
			<div class="d-flex flex-wrap align-items-center gap-2">
				<span class="badge rounded-pill" th:classappend="${row.lifecycle.badgeClass}" th:text="${row.lifecycle.label}">status</span>
				<a class="btn btn-sm btn-outline-primary" th:if="${row.submission != null}"
				   th:href="@{/intern/submissions/{sid}/feedback(sid=${row.submission.id})}">Feedback</a>
			</div>
		</li>
	</ul>
	<p class="text-secondary" th:if="${#lists.isEmpty(taskRows)}">No assignments yet.</p>
	<form th:action="@{/logout}" method="post">
		<button class="btn btn-outline-secondary" type="submit">Sign out</button>
	</form>
</main>
</body>
</html>
