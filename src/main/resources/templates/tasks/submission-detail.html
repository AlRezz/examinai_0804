<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<title>Submission detail</title>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body>
<main>
	<h1>Submission</h1>
	<p>Task: <strong th:text="${task.title}">task</strong></p>
	<p th:if="${submissionNotice}" th:text="${submissionNotice}">notice</p>
	<p th:if="${submissionError}" th:text="${submissionError}" style="color: crimson;">err</p>

	<section th:replace="~{tasks/fragments/git-retrieval :: status(${submission})}"></section>

	<h2>Coordinates</h2>
	<form th:action="@{/tasks/{tid}/submissions/{iid}/coordinates(tid=${task.id},iid=${internId})}" th:object="${submissionForm}"
	      method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<p>
			<label>Repository (owner/name) <input type="text" th:field="*{repoIdentifier}" size="60"/></label>
		</p>
		<p th:if="${#fields.hasErrors('repoIdentifier')}" th:errors="*{repoIdentifier}" style="color: crimson;">err</p>
		<p>
			<label>Commit SHA <input type="text" th:field="*{commitSha}" size="48"/></label>
		</p>
		<p th:if="${#fields.hasErrors('commitSha')}" th:errors="*{commitSha}" style="color: crimson;">err</p>
		<p>
			<label>Path scope (optional file path) <input type="text" th:field="*{pathScope}" size="48"/><br/>
				<small>Leave blank to use README.md at repository root (GitHub-style hosts).</small>
			</label>
		</p>
		<p th:if="${#fields.hasErrors('pathScope')}" th:errors="*{pathScope}" style="color: crimson;">err</p>
		<button type="submit">Save coordinates</button>
	</form>

	<form th:if="${submission != null}"
	      th:action="@{/tasks/{tid}/submissions/{iid}/fetch(tid=${task.id},iid=${internId})}" method="post" style="margin-top:1em;">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<button type="submit">Fetch / re-fetch source</button>
	</form>

	<p><a th:href="@{/tasks/{tid}/submissions(tid=${task.id})}">Back to list</a></p>
</main>
</body>
</html>
