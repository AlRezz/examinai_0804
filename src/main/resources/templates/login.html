<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title>Sign in</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<th:block th:replace="~{fragments/head-bootstrap :: styles}" />
</head>
<body>
<main>
	<h1>Sign in</h1>
	<p th:if="${logoutNotice}" class="notice" role="status">You have been signed out.</p>
	<p th:if="${loginError}" class="error" role="alert">Sign-in was not successful. Please check your email and password.</p>
	<form th:action="@{/login}" method="post">
		<p>
			<label for="username">Email</label><br />
			<input id="username" name="username" type="email" autocomplete="username" required />
		</p>
		<p>
			<label for="password">Password</label><br />
			<input id="password" name="password" type="password" autocomplete="current-password" required />
		</p>
		<p>
			<button type="submit">Sign in</button>
		</p>
	</form>
	<p><a th:href="@{/}" href="#">Back</a></p>
</main>
</body>
</html>
