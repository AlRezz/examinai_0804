server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: false

spring:
  datasource:
    # Unique DB name per process + Liquibase + H2/DATABASE_TO_LOWER avoids stale DATABASECHANGELOG between test contexts.
    url: jdbc:h2:mem:examinai_test_${random.uuid};DB_CLOSE_DELAY=0;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
  ai:
    ollama:
      base-url: http://127.0.0.1:9

management:
  endpoints:
    web:
      exposure:
        include: health
