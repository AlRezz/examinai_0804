examinai:
  intern:
    # Legacy binding (Epic 6.2); intern "Your feedback" page shows official outcomes only — no AI panel (Epic 10).
    show-ai-draft-to-intern: ${EXAMINAI_INTERN_SHOW_AI_DRAFT:true}
  ai:
    llm-health-probe:
      enabled: ${EXAMINAI_LLM_HEALTH_PROBE_ENABLED:false}
      connect-timeout-ms: ${EXAMINAI_LLM_HEALTH_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${EXAMINAI_LLM_HEALTH_READ_TIMEOUT_MS:3000}
    draft-assessment:
      max-source-chars: ${EXAMINAI_AI_DRAFT_MAX_SOURCE_CHARS:100000}
      request-timeout-seconds: ${EXAMINAI_AI_DRAFT_TIMEOUT_SECONDS:600}
      max-retries: ${EXAMINAI_AI_DRAFT_MAX_RETRIES:2}
      retry-backoff-ms: ${EXAMINAI_AI_DRAFT_RETRY_BACKOFF_MS:400}
      max-inference-wall-seconds: ${EXAMINAI_AI_DRAFT_MAX_INFERENCE_WALL_SECONDS:600}
      max-flash-chars: ${EXAMINAI_AI_DRAFT_MAX_FLASH_CHARS:32768}
      audit-model-version: ${EXAMINAI_AI_AUDIT_MODEL_VERSION:}
  git:
    # Deployment-only: set via environment (see .env.example). Never collect from UI or database.
    base-url: ${GIT_PROVIDER_BASE_URL:https://api.github.com}
    token: ${GIT_PROVIDER_TOKEN:}
    read-timeout-seconds: ${GIT_READ_TIMEOUT_SECONDS:22}
    max-retries: ${GIT_MAX_RETRIES:2}
    retry-backoff-ms: ${GIT_RETRY_BACKOFF_MS:350}

spring:
  application:
    name: examinai
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:deepseek-r1:8b}
      init:
        # Pull chat model on startup if missing (avoids Ollama 404 "model not found" when only defaults are set).
        # Tests override this to `never` (see application-test.yml). Override with OLLAMA_MODEL for a smaller/faster model.
        pull-model-strategy: when_missing
        max-retries: 2
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

logging:
  level:
    com.examinai.app.service: DEBUG
    com.examinai.app.integration.ai: DEBUG

management:
  endpoints:
    web:
      base-path: /actuator
