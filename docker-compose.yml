# Pilot tri-service topology (FR32): app + PostgreSQL + Ollama.
# Requires Docker Compose file format v3+ (`docker compose` plugin or `docker-compose` v1.27+).
#
# Quick start:
#   cp .env.example .env   # edit secrets
#   docker compose up --build
#
# Ports: app 8080, db 5432, Ollama 11434 (see .env.example for overrides).
# OLLAMA_IMAGE = Docker image (e.g. ollama/ollama:0.20.2). OLLAMA_MODEL = model tag for `ollama pull` (same as app).

# Default DB identity matches `.env.example` (`examinai`). Single source: app JDBC uses the same
# `POSTGRES_*` values so the role created on first volume init always matches the app (story 7.4).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-examinai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examinai}
      POSTGRES_DB: ${POSTGRES_DB:-examinai}
    volumes:
      - examinai_pg_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    # pg_isready defaults -U to the *OS* user; healthcheck often runs as root → FATAL "role \"root\" does not exist".
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U \"$$POSTGRES_USER\" -q"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  llm:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.20.2}
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    volumes:
      - examinai_ollama_data:/root/.ollama
    ports:
      - 11434:11434
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        ollama serve &
        sleep 2
        ollama pull "$OLLAMA_MODEL"
        wait
#    healthcheck:
#      test:
#        [
#          "CMD-SHELL",
#          'ollama list 2>/dev/null | grep -Fq "$$OLLAMA_MODEL"',
#        ]
#      interval: 15s
#      timeout: 5s
#      retries: 20
#      start_period: 600s

  app:
    build:
      context: .
      dockerfile: Dockerfile
#    depends_on:
#      db:
#        condition: service_healthy
#      llm:
#        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/${POSTGRES_DB:-examinai}}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-${POSTGRES_USER:-examinai}}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-${POSTGRES_PASSWORD:-examinai}}
      # Default to the Compose service name; 127.0.0.1 inside the app container is not the host Ollama.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://llm:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      GIT_PROVIDER_BASE_URL: ${GIT_PROVIDER_BASE_URL}
      GIT_PROVIDER_TOKEN: ${GIT_PROVIDER_TOKEN}
    ports:
      - 8080:8080
#    healthcheck:
#      test:
#        [
#          "CMD",
#          "curl",
#          "-fsS",
#          "http://127.0.0.1:8080/actuator/health",
#        ]
#      interval: 15s
#      timeout: 5s
#      retries: 5
#      start_period: 90s

volumes:
  examinai_pg_data:
  examinai_ollama_data:
